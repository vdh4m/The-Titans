name: studyhub
description: Educational Platform App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  file_picker: ^10.3.10
  open_filex: ^4.4.0
  path_provider: ^2.1.3
  image_picker: ^1.1.2
  dio: ^5.8.0+1
  intl: ^0.20.2
  uuid: ^4.4.0
  url_launcher: ^6.2.6
  flutter_local_notifications: ^21.0.0
  http: ^1.2.1
  permission_handler: ^11.3.1
  webview_flutter: ^4.10.0
  jitsi_meet_flutter_sdk: ^10.2.0
  syncfusion_flutter_pdfviewer: ^28.1.33
  video_player: ^2.9.2
  flutter_pdfview: ^1.3.2
  photo_view: ^0.15.0
  chewie: ^1.8.5
  just_audio: ^0.9.46
  google_generative_ai: ^0.4.6
  flutter_tts: ^4.1.0
  flutter_gen: 5.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3
  google_mlkit_text_recognition: ^0.13.0
  translator: ^1.0.0
  pdf: ^3.10.8
  printing: ^5.12.0
  camera: ^0.10.5+9
  supabase_flutter: ^2.9.0
  clipboard: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/photo.jpg"
  adaptive_icon_background: "#3A90A3"
  adaptive_icon_foreground: "assets/images/photo.jpg"
  web:
    generate: true
    image_path: "assets/images/photo.jpg"
    background_color: "#3A90A3"

flutter_native_splash:
  color: "#3A90A3"
  image: assets/images/photo.jpg
  android: true
  ios: true
  android_12:
    color: "#3A90A3"
    image: assets/images/photo.jpg

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
